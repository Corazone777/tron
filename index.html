<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibex</title>
    <link rel="icon" href="data:,">

    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/materialsLibrary/babylonjs.materials.min.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #020118;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
        }

        /* Restored Retro Synthwave Grid Background */
        .grid-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            background-image:
                linear-gradient(rgba(0, 243, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center bottom;
        }

        #stars-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        .sun-container {
            position: absolute;
            bottom: 30%; left: 50%;
            transform: translateX(-50%);
            width: 60vw; max-width: 800px;
            z-index: 2;
        }

        .retro-sun {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            background: linear-gradient(to bottom, #00f3ff 0%, #0066ff 50%, #1a0040 100%);
            box-shadow: 0 0 150px #0088ff, 0 0 300px #0044aa;
            mask-image: repeating-linear-gradient(to bottom, #000 0%, #000 3%, transparent 3%, transparent 4%);
            -webkit-mask-image: repeating-linear-gradient(to bottom, #000 0%, #000 3%, transparent 3%, transparent 4%);
        }

        /* Babylon Render Canvas */
        #renderCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 3;
            touch-action: none;
            outline: none;
        }

        #birds-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 4;
            pointer-events: none;
        }

        .logo-glow-wrap {
            position: absolute;
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
            width: 25vw; max-width: 350px; min-width: 200px;
            pointer-events: none;
            z-index: 5;
        }

        .ibex-logo {
            position: relative; width: 100%; pointer-events: none; opacity: 0.95;
            filter: brightness(0) invert(1) drop-shadow(-2px -2px 0 rgba(0, 243, 255, 0.9));
        }

        .ibex-logo-outline, .logo-shine { display: none; }

        /* CRT Scanlines Overlay */
        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(0, 100, 255, 0.04), rgba(0, 255, 255, 0.02), rgba(0, 50, 255, 0.04));
            background-size: 100% 4px, 6px 100%;
            z-index: 10; pointer-events: none;
            animation: scanlineScroll 8s linear infinite;
        }

        @keyframes scanlineScroll {
            0% { background-position: 0 0, 0 0; }
            100% { background-position: 0 800px, 0 0; }
        }

        /* Toggle Button - Question Mark */
        .toggle-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0, 20, 60, 0.6);
            border: 2px solid rgba(0, 243, 255, 0.5);
            color: #00f3ff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 15px rgba(0, 100, 255, 0.3);
            transition: all 0.3s ease;
            outline: none;
            pointer-events: auto;
        }

        .toggle-btn:hover {
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.8);
            background: rgba(0, 40, 100, 0.8);
            transform: scale(1.1);
        }

        .toggle-btn svg {
            width: 24px;
            height: 24px;
            stroke: #00f3ff;
            filter: drop-shadow(0 0 5px rgba(0, 243, 255, 0.8));
        }

        /* Holographic UI Panel */
        .holo-panel {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            z-index: 20; width: 480px; padding: 36px 40px;
            background: linear-gradient(135deg, rgba(0, 20, 60, 0.35), rgba(0, 10, 40, 0.5));
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 243, 255, 0.25); border-radius: 16px;
            box-shadow: 0 0 30px rgba(0, 100, 255, 0.15), 0 0 80px rgba(0, 100, 255, 0.05), inset 0 0 30px rgba(0, 100, 255, 0.05);
            font-family: 'Arial', sans-serif; color: rgba(0, 243, 255, 0.9);
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);

            /* Hidden by default */
            opacity: 0;
            pointer-events: none;
        }

        .holo-panel.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }

        .holo-panel::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 243, 255, 0.6), transparent);
        }

        .holo-title {
            font-size: 15px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
            text-align: center; margin-bottom: 28px; text-shadow: 0 0 12px rgba(0, 243, 255, 0.5);
        }

        .landscape-slider {
            display: flex; position: relative; background: rgba(0, 20, 60, 0.4);
            border: 1px solid rgba(0, 243, 255, 0.15); border-radius: 8px; overflow: hidden; margin-bottom: 20px;
        }

        .slider-option {
            flex: 1; text-align: center; padding: 12px 8px; cursor: pointer; font-size: 13px;
            letter-spacing: 1.2px; text-transform: uppercase; color: rgba(0, 200, 255, 0.5);
            transition: color 0.4s ease; position: relative; z-index: 1; user-select: none;
        }

        .slider-option:hover { color: rgba(0, 243, 255, 0.8); }
        .slider-option.active { color: #fff; text-shadow: 0 0 10px rgba(0, 243, 255, 0.8); }

        .slider-indicator {
            position: absolute; top: 2px; bottom: 2px; width: calc(33.333% - 4px);
            background: rgba(0, 100, 255, 0.25); border: 1px solid rgba(0, 243, 255, 0.4); border-radius: 6px;
            transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 15px rgba(0, 100, 255, 0.2); left: calc(33.333% + 2px);
        }

        .fte-label { font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: rgba(0, 200, 255, 0.7); margin-bottom: 10px; }
        .fte-row { display: flex; gap: 16px; }
        .fte-col { flex: 1; }

        .fte-input {
            width: 100%; padding: 14px 16px; background: rgba(0, 20, 60, 0.4);
            border: 1px solid rgba(0, 243, 255, 0.2); border-radius: 8px; color: #fff;
            font-size: 20px; font-family: 'Arial', sans-serif; letter-spacing: 2px;
            outline: none; transition: border-color 0.3s, box-shadow 0.3s;
            -moz-appearance: textfield; appearance: textfield; box-sizing: border-box;
        }

        .fte-input::-webkit-outer-spin-button, .fte-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .fte-input:focus { border-color: rgba(0, 243, 255, 0.5); box-shadow: 0 0 20px rgba(0, 100, 255, 0.15); }
        .fte-input::placeholder { color: rgba(0, 200, 255, 0.25); font-size: 14px; letter-spacing: 1px; }

        .budget-wrap { position: relative; display: flex; align-items: center; }
        .budget-wrap .currency-prefix { position: absolute; left: 16px; color: rgba(0, 200, 255, 0.5); font-size: 20px; font-family: 'Arial', sans-serif; pointer-events: none; letter-spacing: 1px; }
        .budget-wrap .currency-suffix { position: absolute; right: 16px; color: rgba(0, 200, 255, 0.35); font-size: 11px; font-family: 'Arial', sans-serif; letter-spacing: 2px; text-transform: uppercase; pointer-events: none; }
        .budget-wrap .fte-input { padding-left: 32px; padding-right: 52px; }

        /* Gold ROI Results Panel */
        .roi-panel {
            margin-top: 24px; padding: 24px 20px;
            background: linear-gradient(135deg, rgba(60, 40, 0, 0.35), rgba(40, 25, 0, 0.5));
            border: 1px solid rgba(255, 200, 50, 0.3); border-radius: 12px;
            box-shadow: 0 0 30px rgba(255, 180, 0, 0.1), 0 0 60px rgba(255, 180, 0, 0.05), inset 0 0 20px rgba(255, 180, 0, 0.05);
            position: relative; overflow: hidden; opacity: 0; max-height: 0;
            transition: opacity 0.8s ease, max-height 0.8s ease, padding 0.8s ease; padding: 0 20px;
        }

        .roi-panel.visible { opacity: 1; max-height: 400px; padding: 24px 20px; }
        .roi-panel::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 200, 50, 0.7), transparent);
        }
        .roi-panel::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; width: 300%;
            background: linear-gradient(90deg, transparent 0%, transparent 30%, rgba(255, 200, 50, 0.08) 50%, transparent 70%, transparent 100%);
            animation: roiSweep 4s cubic-bezier(0.4, 0, 0.6, 1) infinite; pointer-events: none;
        }

        @keyframes roiSweep { 0% { transform: translateX(-100%); } 100% { transform: translateX(33.33%); } }
        .roi-title { font-size: 13px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; text-align: center; margin-bottom: 20px; color: rgba(255, 200, 50, 0.9); text-shadow: 0 0 12px rgba(255, 180, 0, 0.5); }
        .roi-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
        .roi-stat { text-align: center; position: relative; }
        .roi-stat-value { font-size: 28px; font-weight: 700; color: rgba(255, 220, 80, 1); text-shadow: 0 0 15px rgba(255, 180, 0, 0.6); letter-spacing: 1px; transition: color 0.15s ease; position: relative; }
        .roi-stat-value.glitching { animation: roiGlitch 0.08s steps(1) infinite; }
        .roi-stat-value.glitch-settle { animation: roiSettle 0.3s ease-out forwards; }

        @keyframes roiGlitch {
            0%   { text-shadow: 0 0 15px rgba(255,180,0,0.6), -2px 0 rgba(255,50,50,0.5); }
            25%  { text-shadow: 0 0 15px rgba(255,180,0,0.6), 2px 0 rgba(50,255,50,0.5); }
            50%  { text-shadow: 0 0 20px rgba(255,220,80,0.9), 0 -1px rgba(50,50,255,0.5); }
            75%  { text-shadow: 0 0 15px rgba(255,180,0,0.6), -1px 1px rgba(255,255,50,0.5); }
            100% { text-shadow: 0 0 15px rgba(255,180,0,0.6), 1px -1px rgba(255,50,255,0.5); }
        }

        @keyframes roiSettle {
            0%   { text-shadow: 0 0 25px rgba(255,220,80,1), 0 0 40px rgba(255,180,0,0.5); transform: scale(1.08); }
            100% { text-shadow: 0 0 15px rgba(255,180,0,0.6); transform: scale(1); }
        }

        .roi-stat-label { font-size: 10px; letter-spacing: 1.2px; text-transform: uppercase; color: rgba(255, 200, 50, 0.6); margin-top: 6px; line-height: 1.4; }

        /* Tron grid-line animation */
        .roi-panel .tron-line { position: absolute; background: rgba(255, 200, 50, 0.25); box-shadow: 0 0 6px rgba(255, 180, 0, 0.15); pointer-events: none; opacity: 0; }
        .roi-panel .tron-line.horizontal { height: 1px; width: 0; left: 0; animation: tronExpandH 0.8s ease forwards, tronFadeIn 0.4s ease forwards; }
        .roi-panel .tron-line.vertical { width: 1px; height: 0; top: 0; animation: tronExpandV 0.8s ease forwards, tronFadeIn 0.4s ease forwards; }
        .roi-panel .tron-line.fade-out { animation: tronFadeOut 1.2s ease forwards !important; }
        .roi-panel .tron-line.horizontal.fade-out { animation: tronShrinkH 1.2s ease forwards, tronFadeOut 1.2s ease forwards !important; }
        .roi-panel .tron-line.vertical.fade-out { animation: tronShrinkV 1.2s ease forwards, tronFadeOut 1.2s ease forwards !important; }

        @keyframes tronExpandH { to { width: 100%; } }
        @keyframes tronExpandV { to { height: 100%; } }
        @keyframes tronFadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes tronFadeOut { from { opacity: 1; } to { opacity: 0; } }
        @keyframes tronShrinkH { from { width: 100%; } to { width: 0; left: 50%; } }
        @keyframes tronShrinkV { from { height: 100%; } to { height: 0; top: 50%; } }

        /* Hero Text & Flip Board */
        .hero-text-container {
            position: absolute;
            top: 22%; /* Sits right below your logo */
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 5;
            width: 90vw;
            max-width: 800px;
            pointer-events: none;
            color: #fff;
            text-shadow: 0 0 15px rgba(0, 243, 255, 0.8);
        }

        .hero-headline {
            font-size: 22px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 1.5px;
        }

        .hero-subheadline {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.85);
            font-family: 'Arial', sans-serif;
            line-height: 1.8;
            letter-spacing: 0.5px;
        }

        .flip-board {
            display: inline-block;
            font-family: 'Courier New', Courier, monospace;
            font-size: 22px;
            font-weight: bold;
            color: #ff00ff; /* Retro neon pink */
            text-shadow: 0 0 12px rgba(255, 0, 255, 0.8);
            margin-top: 8px;
            background: rgba(0, 20, 60, 0.6);
            padding: 6px 16px;
            border: 1px solid rgba(255, 0, 255, 0.5);
            border-radius: 6px;
            box-shadow: inset 0 0 10px rgba(255, 0, 255, 0.2);
        }

    </style>
</head>

                    <div class="roi-stat-label">Hours Saved</div>
                </div>
            </div>
        </div>
    </div>

    <div class="scanlines"></div>

    <script>
        /* ================================================================
         * STICK FIGURES ON MOUNTAIN (Babylon.js Implementation)
         * ================================================================ */
        // Create stick figure texture via canvas to DataURL for Babylon SpriteManager
        const figCanvas = document.createElement('canvas');
        figCanvas.width = 32; figCanvas.height = 64;
        const fCtx = figCanvas.getContext('2d');
        fCtx.strokeStyle = '#ffffff'; fCtx.lineWidth = 3; fCtx.lineCap = 'round';
        fCtx.beginPath(); fCtx.arc(16, 8, 5, 0, Math.PI * 2); fCtx.stroke(); // Head
        fCtx.beginPath(); fCtx.moveTo(16, 13); fCtx.lineTo(16, 38); fCtx.stroke(); // Body
        fCtx.beginPath(); fCtx.moveTo(6, 24); fCtx.lineTo(16, 20); fCtx.lineTo(26, 24); fCtx.stroke(); // Arms
        fCtx.beginPath(); fCtx.moveTo(8, 56); fCtx.lineTo(16, 38); fCtx.lineTo(24, 56); fCtx.stroke(); // Legs
        const figDataUrl = figCanvas.toDataURL();

        // Smoke puff texture via canvas to DataURL
        const smokeCanvas = document.createElement('canvas');
        smokeCanvas.width = 16; smokeCanvas.height = 16;
        const smCtx = smokeCanvas.getContext('2d');
        smCtx.fillStyle = '#00f3ff';
        [[3,2],[4,2],[3,3],[4,3],[5,3],[2,4],[3,4],[4,4],[5,4],[2,5],[3,5],[4,5],[5,5],[3,6],[4,6]].forEach(([gx,gy]) => smCtx.fillRect(gx * 2, gy * 2, 2, 2));
        const smokeDataUrl = smokeCanvas.toDataURL();

        // Global trackers for figures
        let figManager, smokeManager;
        const figSprites = [];
        const smokePuffs = [];
        window.fteTarget = 0;
        let fadingOut = false;
        let figWaveTime = 0;
        let figWaveTimer = 0;
        let figWaveInterval = 4;

        // Sample valid positions using Raycasts onto the babylon mountain
        function sampleMountainPositions(count, scene) {
            const positions = [];
            let attempts = 0;
            while (positions.length < count && attempts < count * 20) {
                attempts++;
                const radius = 30; // Max radius on mountain
                const angle = Math.random() * Math.PI * 2;
                const r = Math.sqrt(Math.random()) * radius;
                const x = Math.cos(angle) * r;
                const z = Math.sin(angle) * r;

                if (!window.babylonMountain) continue;

                const ray = new BABYLON.Ray(new BABYLON.Vector3(x, 100, z), new BABYLON.Vector3(0, -1, 0), 200);
                const pick = scene.pickWithRay(ray, (m) => m === window.babylonMountain);

                // Ensure it hit the mountain and is slightly elevated above the floor
                if (pick.hit && pick.pickedPoint.y > 1.0) {
                    positions.push(pick.pickedPoint.clone());
                }
            }
            return positions;
        }

        function spawnSmokePuff(pos) {
            if (!smokeManager) return;
            const count = 4 + Math.floor(Math.random() * 4);
            for (let i = 0; i < count; i++) {
                const s = new BABYLON.Sprite("smoke", smokeManager);
                s.position.copyFrom(pos);
                s.position.x += (Math.random() - 0.5) * 0.6;
                s.position.y += Math.random() * 0.4;
                s.position.z += (Math.random() - 0.5) * 0.6;
                s.size = 0.3 + Math.random() * 0.4;
                s.color = new BABYLON.Color4(1, 1, 1, 0.9);
                smokePuffs.push({
                    sprite: s,
                    vx: (Math.random() - 0.5) * 0.05,
                    vy: 0.02 + Math.random() * 0.03,
                    life: 1.0,
                    decay: 0.02 + Math.random() * 0.02
                });
            }
        }

        function spawnFigure(pos) {
            if (!figManager) return;
            const s = new BABYLON.Sprite("fig", figManager);
            s.position.copyFrom(pos);
            s.position.y += 0.8; // Stand on surface
            s.width = 0.8;
            s.height = 1.6;
            s.color = new BABYLON.Color4(0, 0.95, 1, 0); // Transparent cyan
            spawnSmokePuff(s.position);

            const dist = Math.sqrt(pos.x * pos.x + pos.z * pos.z);
            figSprites.push({
                sprite: s,
                targetOpacity: 1.0,
                currentOpacity: 0,
                blinkTime: 0,
                blinkPhase: 0,
                dist: dist
            });
        }

        function removeFigure(index) {
            const fig = figSprites[index];
            spawnSmokePuff(fig.sprite.position);
            fig.sprite.dispose();
            figSprites.splice(index, 1);
        }

        function updateFigures(scene) {
            if (fadingOut) return; 

            // Power curve logic translated
            const renderCount = window.fteTarget <= 0 ? 0 : Math.min(Math.round(Math.pow(window.fteTarget, 1.4)), 600);
            const current = figSprites.length;
            const spawnRate = Math.max(1, Math.floor(Math.abs(renderCount - current) / 10));

            if (current < renderCount) {
                const pts = sampleMountainPositions(Math.min(spawnRate, renderCount - current), scene);
                pts.forEach(p => spawnFigure(p));
            } else if (current > renderCount) {
                for(let i = 0; i < Math.min(spawnRate, current - renderCount); i++){
                    removeFigure(figSprites.length - 1);
                }
            }
        }

        function updateFigureAnimation(scene) {
            figWaveTimer += 0.016;
            if (figWaveTimer >= figWaveInterval) {
                figWaveTimer = 0;
                figWaveTime = 0;
                figWaveInterval = 4 + Math.random() * 4;
            }
            figWaveTime += 0.016;
            const waveFront = figWaveTime * 20; 
            const waveWidth = 8;

            for (let i = figSprites.length - 1; i >= 0; i--) {
                const f = figSprites[i];
                const diff = f.targetOpacity - f.currentOpacity;
                f.currentOpacity += diff * 0.08;
                
                // Concentric wave blink
                if (!fadingOut && waveFront >= f.dist && waveFront < f.dist + waveWidth && f.blinkPhase === 0) {
                    f.blinkPhase = 1;
                    f.blinkTime = 0;
                }
                if (f.blinkPhase === 1) {
                    f.blinkTime += 0.16; // 100ms fade in
                    if (f.blinkTime >= 1.0) { f.blinkTime = 1.0; f.blinkPhase = 2; }
                }
                if (f.blinkPhase === 2) {
                    f.blinkTime -= 0.005; // 3s fade out
                    if (f.blinkTime <= 0) { f.blinkTime = 0; f.blinkPhase = 0; }
                }

                // Apply color mix
                const t = f.blinkTime;
                f.sprite.color.r = t;
                f.sprite.color.g = 0.95 + t * 0.05;
                f.sprite.color.b = 1;
                f.sprite.color.a = f.currentOpacity;

                if (fadingOut && f.currentOpacity < 0.01) {
                    f.sprite.dispose();
                    figSprites.splice(i, 1);
                }
            }

            if (fadingOut && figSprites.length === 0) fadingOut = false;

            for (let i = smokePuffs.length - 1; i >= 0; i--) {
                const p = smokePuffs[i];
                p.life -= p.decay;
                p.sprite.position.x += p.vx;
                p.sprite.position.y += p.vy;
                p.sprite.color.a = Math.max(0, p.life * 0.8);
                const grow = 0.3 + (1 - p.life) * 0.5;
                p.sprite.size = grow;
                if (p.life <= 0) {
                    p.sprite.dispose();
                    smokePuffs.splice(i, 1);
                }
            }

            if (!fadingOut) updateFigures(scene);
        }

        function startFadeOut() {
            fadingOut = true;
            figSprites.forEach(f => f.targetOpacity = 0);
        }


        /* ================================================================
         * 2D BACKGROUND EFFECTS (Stars, Meteors, Birds)
         * ================================================================ */
         let stagModel = null;
         let angle = 0;

        const starsCanvas = document.getElementById('stars-canvas');
        const ctx2d = starsCanvas.getContext('2d');
        starsCanvas.width = window.innerWidth;
        starsCanvas.height = window.innerHeight;

        const birdsCanvas = document.getElementById('birds-canvas');
        const birdsCtx = birdsCanvas.getContext('2d');
        birdsCanvas.width = window.innerWidth;
        birdsCanvas.height = window.innerHeight;

        const stars = [];
        for (let i = 0; i < 200; i++) {
            stars.push({
                x: Math.random() * starsCanvas.width,
                y: Math.random() * starsCanvas.height * 0.65,
                size: Math.random() < 0.1 ? 2 + Math.random() * 2 : 1 + Math.random(),
                brightness: 0.3 + Math.random() * 0.7,
                twinkleSpeed: 0.5 + Math.random() * 3
            });
        }

        const meteors = [];
        function spawnMeteor() {
            meteors.push({
                x: Math.random() * starsCanvas.width,
                y: Math.random() * starsCanvas.height * 0.3,
                vx: 4 + Math.random() * 6,
                vy: 2 + Math.random() * 3,
                life: 1.0, length: 30 + Math.random() * 50, size: 1 + Math.random()
            });
        }

        const birds = [];
        function spawnBird() {
            const dir = Math.random() > 0.5 ? 1 : -1;
            const speedFactor = 0.85 + Math.random() * 0.30;
            birds.push({
                x: dir > 0 ? -30 : starsCanvas.width + 30,
                y: 30 + Math.random() * starsCanvas.height * 0.25,
                vx: dir * (0.4 + Math.random() * 0.6) * speedFactor,
                wingPhase: Math.random() * Math.PI * 2,
                wingSpeed: (1.2 + Math.random() * 1.5) * speedFactor,
                scale: 2 + Math.random() * 3
            });
        }

        let stars2dTime = 0;
        function drawStarsLayer() {
            stars2dTime += 0.016;
            ctx2d.clearRect(0, 0, starsCanvas.width, starsCanvas.height);

            stars.forEach(s => {
                const flicker = 0.5 + 0.5 * Math.sin(stars2dTime * s.twinkleSpeed + s.x);
                const alpha = s.brightness * flicker;
                ctx2d.fillStyle = `rgba(180, 220, 255, ${alpha})`;
                ctx2d.fillRect(Math.floor(s.x), Math.floor(s.y), Math.ceil(s.size), Math.ceil(s.size));
            });

            for (let i = meteors.length - 1; i >= 0; i--) {
                const m = meteors[i];
                m.x += m.vx; m.y += m.vy; m.life -= 0.015;
                if (m.life <= 0) { meteors.splice(i, 1); continue; }
                const grad = ctx2d.createLinearGradient(m.x, m.y, m.x - m.vx * m.length / 6, m.y - m.vy * m.length / 6);
                grad.addColorStop(0, `rgba(180, 230, 255, ${m.life})`);
                grad.addColorStop(1, `rgba(80, 160, 255, 0)`);
                ctx2d.strokeStyle = grad; ctx2d.lineWidth = m.size;
                ctx2d.beginPath(); ctx2d.moveTo(m.x, m.y); ctx2d.lineTo(m.x - m.vx * m.length / 6, m.y - m.vy * m.length / 6); ctx2d.stroke();
                ctx2d.fillStyle = `rgba(220, 240, 255, ${m.life})`;
                ctx2d.fillRect(Math.floor(m.x) - 1, Math.floor(m.y) - 1, 3, 3);
            }

            if (Math.random() < 0.005) spawnMeteor();
            if (Math.random() < 0.0005) spawnBird();
        }

        function drawBirdsLayer() {
            birdsCtx.clearRect(0, 0, birdsCanvas.width, birdsCanvas.height);
            for (let i = birds.length - 1; i >= 0; i--) {
                const b = birds[i];
                b.x += b.vx; b.wingPhase += b.wingSpeed * 0.016;
                if (b.x < -50 || b.x > birdsCanvas.width + 50) { birds.splice(i, 1); continue; }
                const wingY = Math.sin(b.wingPhase) * b.scale * 1.5; const px = Math.floor(b.scale);
                birdsCtx.fillStyle = 'rgba(0, 243, 255, 0.85)'; birdsCtx.fillRect(Math.floor(b.x), Math.floor(b.y), px, px);
                birdsCtx.fillRect(Math.floor(b.x) - px * 2, Math.floor(b.y + wingY), px, px); birdsCtx.fillRect(Math.floor(b.x) - px, Math.floor(b.y + wingY * 0.5), px, px);
                birdsCtx.fillRect(Math.floor(b.x) + px * 2, Math.floor(b.y + wingY), px, px); birdsCtx.fillRect(Math.floor(b.x) + px, Math.floor(b.y + wingY * 0.5), px, px);
            }
        }

        /* ================================================================
         * BABYLON.JS MOUNTAIN ENGINE
         * ================================================================ */
        const renderCanvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(renderCanvas, true, { preserveDrawingBuffer: true, stencil: true, alpha: true });

        window.babylonMountain = null;
        window.targetMountainScaleY = 1.0;

        const createScene = function () {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color4(0, 0, 0, 0);

            const camera = new BABYLON.ArcRotateCamera("camera", -Math.PI / 2, Math.PI / 2.15, 75, new BABYLON.Vector3(0, 7, 0), scene);

            // Re-attach control so we can orbit, but strictly lock zooming and panning
            camera.attachControl(renderCanvas, true);

            // LOCK ZOOM (Scroll)
            camera.lowerRadiusLimit = 75;
            camera.upperRadiusLimit = 75;

            // LOCK PANNING (Right click / Two finger drag)
            camera.panningSensibility = 0;

            const leftLight = new BABYLON.DirectionalLight("leftLight", new BABYLON.Vector3(1, -0.3, 0.5), scene);
            leftLight.diffuse = new BABYLON.Color3(0.1, 0.8, 0.9);
            leftLight.intensity = 1.6;

            const rightLight = new BABYLON.DirectionalLight("rightLight", new BABYLON.Vector3(-1, -0.3, 0.5), scene);
            rightLight.diffuse = new BABYLON.Color3(0.02, 0.08, 0.25);
            rightLight.intensity = 1.8;

            const ambient = new BABYLON.HemisphericLight("ambient", new BABYLON.Vector3(0, 1, 0), scene);
            ambient.diffuse = new BABYLON.Color3(0.05, 0.1, 0.2);
            ambient.intensity = 0.3;

            // Initialize Sprite Managers for figures and smoke
            figManager = new BABYLON.SpriteManager("figManager", figDataUrl, 1000, {width: 32, height: 64}, scene);
            smokeManager = new BABYLON.SpriteManager("smokeManager", smokeDataUrl, 3000, {width: 16, height: 16}, scene);

            BABYLON.SceneLoader.ImportMesh("", "./", "stag_test.glb", scene, (meshes, ps, skel, anims) => {
                stagModel = meshes[0];
                stagModel.scaling = new BABYLON.Vector3(0.7, 0.7, 0.7);
                if (anims[4]) anims[4].play(true);
            });

            // Shared material
            const mountainMat = new BABYLON.StandardMaterial("mountainMat", scene);
            mountainMat.specularColor = new BABYLON.Color3(0, 0, 0);
            mountainMat.diffuseColor = new BABYLON.Color3(0.65, 0.65, 0.65);
                
            // Creates the seamless transition between the mountain base and the grid floor
            const infiniteGridFloor = BABYLON.MeshBuilder.CreateGround("infiniteGridFloor", { width: 500, height: 500 }, scene);
            infiniteGridFloor.position.y = -0.1;

            const gridMat = new BABYLON.GridMaterial("gridMat", scene);
            gridMat.mainColor = new BABYLON.Color3(0, 0, 0);
            gridMat.lineColor = new BABYLON.Color3(0, 1, 1);
            gridMat.majorUnitFrequency = 10;
            gridMat.minorUnitVisibility = 0.5;
            gridMat.opacity = 0.9;
            gridMat.backFaceCulling = false;

            infiniteGridFloor.material = gridMat;

            // Mountain
            const size = 70;
            const subdivisions = 45;
            const mountain = BABYLON.MeshBuilder.CreateGround("mountain", { width: size, height: size, subdivisions: subdivisions }, scene);
            window.babylonMountain = mountain;

            const positions = mountain.getVerticesData(BABYLON.VertexBuffer.PositionKind);
            const maxDist = size / 2;

            for (let i = 0; i < positions.length; i += 3) {
                const x = positions[i];
                const z = positions[i + 2];
                const distance = Math.sqrt(x * x + z * z);
                let y = 0;

                if (distance < maxDist) {
                    let normalizedDist = 1.0 - (distance / maxDist);
                    y = Math.pow(normalizedDist, 2.5) * 28;

                    let macroNoise = Math.sin(x * 0.2) * Math.cos(z * 0.2) * 5.0;
                    let sharpRidges = Math.abs(Math.sin(x * 0.4 + z * 0.3)) * 3.5;
                    let detailNoise = (Math.sin(x * 0.8 - z * 0.7) + Math.cos(x * 0.7 + z * 0.8)) * 1.5;

                    y += (macroNoise + sharpRidges + detailNoise) * Math.pow(normalizedDist, 1.2);

                    let peakDist = Math.sqrt((x - 1.5)*(x - 1.5) + (z + 1.0)*(z + 1.0));
                    let peakInfluence = Math.max(0, 1.0 - (peakDist / 12));
                    y += Math.pow(peakInfluence, 2.0) * 6;
                }
                y = Math.round(Math.max(0, y) * 1.0) / 1.0;
                positions[i + 1] = y;
            }

            mountain.setVerticesData(BABYLON.VertexBuffer.PositionKind, positions);
            mountain.convertToFlatShadedMesh();
            mountain.material = mountainMat;

            // Neon Edges
            mountain.enableEdgesRendering(0.94);
            mountain.edgesWidth = 16.0;
            mountain.edgesColor = new BABYLON.Color4(0, 1.0, 1.0, 1.0);

            // Extended horizon neon line
            const basePoints = [
                new BABYLON.Vector3(-250, 0.05, 0),
                new BABYLON.Vector3(250, 0.05, 0)
            ];
            const baseLine = BABYLON.MeshBuilder.CreateLines("baseLine", { points: basePoints }, scene);
            baseLine.color = new BABYLON.Color3(0, 1.0, 1.0);

            for(let i=1; i<=3; i++) {
                let thickLine = baseLine.clone("baseLineThick" + i);
                thickLine.position.z += i * 0.08;
                let thickLine2 = baseLine.clone("baseLineThick" + i);
                thickLine2.position.z -= i * 0.08;
            }

            // Post-Processing
            const glowLayer = new BABYLON.GlowLayer("glowLayer", scene);
            glowLayer.intensity = 1.2;

            const pipeline = new BABYLON.DefaultRenderingPipeline("pipeline", true, scene, [camera]);
            pipeline.bloomEnabled = true;
            pipeline.bloomThreshold = 0.8;
            pipeline.bloomWeight = 1.2;
            pipeline.bloomKernel = 64;

            return scene;
        };

        const scene = createScene();

        engine.runRenderLoop(function () {
            drawStarsLayer();
            drawBirdsLayer();

            if (window.babylonMountain) {
                window.babylonMountain.scaling.y += (window.targetMountainScaleY - window.babylonMountain.scaling.y) * 0.05;
            }

            // Run the stick figure rendering/animation
            updateFigureAnimation(scene);

            if (stagModel && window.babylonMountain) {
                angle += 0.009; // Fast run speed
                const radius = 18;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;

                // --- THE RAYCAST METHOD (FIXES SLOPE ERROR) ---
                const ray = new BABYLON.Ray(new BABYLON.Vector3(x, 50, z), new BABYLON.Vector3(0, -1, 0), 100);
                const pick = scene.pickWithRay(ray, (m) => m === window.babylonMountain);

                if (pick.hit) {
                    stagModel.position.set(x, pick.pickedPoint.y, z);

                    // Look ahead logic
                    const nextX = Math.cos(angle + 0.05) * radius;
                    const nextZ = Math.sin(angle + 0.05) * radius;
                    const nextRay = new BABYLON.Ray(new BABYLON.Vector3(nextX, 50, nextZ), new BABYLON.Vector3(0, -1, 0), 100);
                    const nextPick = scene.pickWithRay(nextRay, (m) => m === window.babylonMountain);

                    if (nextPick.hit) {
                        stagModel.lookAt(nextPick.pickedPoint);
                    }
                }
            }

            scene.render();
        });

        window.addEventListener("resize", function () {
            engine.resize();
            starsCanvas.width = window.innerWidth;
            starsCanvas.height = window.innerHeight;
            birdsCanvas.width = window.innerWidth;
            birdsCanvas.height = window.innerHeight;
            stars.forEach(s => {
                s.x = Math.random() * starsCanvas.width;
                s.y = Math.random() * starsCanvas.height * 0.65;
            });
        });

        /* ================================================================
         * UI LOGIC (Toggle, FTE, ROI, Landscape Selector)
         * ================================================================ */

        const toggleBtn = document.getElementById('toggle-ui-btn');
        const holoPanel = document.getElementById('holo-panel');

        toggleBtn.addEventListener('click', () => {
            holoPanel.classList.toggle('visible');
        });

        const sliderOptions = document.querySelectorAll('.slider-option');
        const sliderIndicator = document.getElementById('slider-indicator');
        let selectedLandscape = 'medium';

        function selectLandscape(value) {
            if (selectedLandscape === value) return;
            selectedLandscape = value;
            sliderOptions.forEach(opt => {
                opt.classList.toggle('active', opt.dataset.value === value);
            });
            const positions = { small: '2px', medium: 'calc(33.333% + 2px)', large: 'calc(66.667% + 2px)' };
            sliderIndicator.style.left = positions[value];

            // Hook the Babylon mountain scale
            if(value === 'small') window.targetMountainScaleY = 0.4;
            if(value === 'medium') window.targetMountainScaleY = 1.0;
            if(value === 'large') window.targetMountainScaleY = 1.6;

            // Fade out figures when mountain changes shape so they don't float!
            startFadeOut(); 
        }

        sliderOptions.forEach(opt => {
            opt.addEventListener('click', () => selectLandscape(opt.dataset.value));
        });

        // ROI Math Logic
        const fteInput = document.getElementById('fte-input');
        const budgetInput = document.getElementById('budget-input');
        const roiPanel = document.getElementById('roi-panel');
        const roiSavings = document.getElementById('roi-savings');
        const roiHires = document.getElementById('roi-hires');
        const roiHours = document.getElementById('roi-hours');
        let roiVisible = false;
        let tronLinesAdded = false;

        function formatCurrency(n) {
            if (n >= 1000000) return '$' + (n / 1000000).toFixed(1) + 'M';
            if (n >= 1000) return '$' + (n / 1000).toFixed(0) + 'K';
            return '$' + n.toFixed(0);
        }

        function addTronLines() {
            if (tronLinesAdded) return;
            tronLinesAdded = true;
            const lines = [];
            const hPositions = [10, 20, 33, 45, 55, 66, 78, 90];
            const vPositions = [8, 18, 28, 38, 50, 62, 72, 82, 92];
            hPositions.forEach((pos, i) => {
                const el = document.createElement('div');
                el.className = 'tron-line horizontal';
                el.style.top = pos + '%';
                el.style.animationDelay = (i * 0.06) + 's';
                roiPanel.appendChild(el);
                lines.push(el);
            });
            vPositions.forEach((pos, i) => {
                const el = document.createElement('div');
                el.className = 'tron-line vertical';
                el.style.left = pos + '%';
                el.style.animationDelay = (i * 0.06 + 0.15) + 's';
                roiPanel.appendChild(el);
                lines.push(el);
            });
            setTimeout(() => {
                lines.forEach((el, i) => {
                    setTimeout(() => el.classList.add('fade-out'), i * 40);
                });
                setTimeout(() => {
                    lines.forEach(el => el.remove());
                    tronLinesAdded = false;
                }, lines.length * 40 + 1400);
            }, 2000);
        }

        function parseBudget(str) {
            return parseFloat(String(str).replace(/[^0-9.]/g, '')) || 0;
        }

        function formatBudgetDisplay(val) {
            const num = Math.min(Math.max(0, Math.round(val)), 300000);
            return num.toLocaleString('en-US');
        }

        const glitchTimers = new Map();
        function glitchTo(el, finalText) {
            if (glitchTimers.has(el)) {
                clearInterval(glitchTimers.get(el).iv);
                clearTimeout(glitchTimers.get(el).to);
            }
            if (el.textContent === finalText) return;
            el.classList.remove('glitch-settle');
            el.classList.add('glitching');
            const chars = finalText.split('');
            const steps = 12;
            let step = 0;
            const iv = setInterval(() => {
                step++;
                const locked = Math.floor((step / steps) * chars.length);
                let scrambled = '';
                for (let i = 0; i < chars.length; i++) {
                    if (i < locked) {
                        scrambled += chars[i];
                    } else if (/[0-9]/.test(chars[i])) {
                        scrambled += Math.floor(Math.random() * 10);
                    } else {
                        scrambled += chars[i];
                    }
                }
                el.textContent = scrambled;
                if (step >= steps) {
                    clearInterval(iv);
                    el.textContent = finalText;
                    el.classList.remove('glitching');
                    el.classList.add('glitch-settle');
                    glitchTimers.delete(el);
                }
            }, 52);
            const to = setTimeout(() => {}, 0);
            glitchTimers.set(el, { iv, to });
        }

        function updateROI() {
            const fte = Math.min(Math.max(0, parseInt(fteInput.value, 10) || 0), 100);
            const budget = Math.min(Math.max(0, parseBudget(budgetInput.value)), 300000);

            window.fteTarget = fte; // Trigger figure spawning

            if (fte > 0 && budget > 0) {
                const savingsPerFTE = budget * 0.70;
                const totalSavings = savingsPerFTE * fte;
                const additionalHires = budget > 0 ? Math.floor(totalSavings / budget) : 0;
                const additionalHours = additionalHires * 174;

                glitchTo(roiSavings, formatCurrency(totalSavings));
                glitchTo(roiHires, additionalHires + '+');
                glitchTo(roiHours, additionalHours.toLocaleString() + '+');

                if (!roiVisible) {
                    roiVisible = true;
                    roiPanel.classList.add('visible');
                    addTronLines();
                }
            } else {
                if (roiVisible) {
                    roiVisible = false;
                    roiPanel.classList.remove('visible');
                }
            }
        }

        fteInput.addEventListener('input', updateROI);
        fteInput.addEventListener('blur', () => {
            let val = parseInt(fteInput.value, 10);
            if (isNaN(val) || val < 0) val = 0;
            if (val > 100) val = 100;
            fteInput.value = val || '';
            updateROI();
        });

        budgetInput.addEventListener('input', () => {
            let raw = parseBudget(budgetInput.value);
            if (raw > 300000) raw = 300000;
            const caret = budgetInput.selectionStart;
            const oldLen = budgetInput.value.length;
            budgetInput.value = formatBudgetDisplay(raw);
            const newLen = budgetInput.value.length;
            const newCaret = Math.max(0, caret + (newLen - oldLen));
            budgetInput.setSelectionRange(newCaret, newCaret);
            updateROI();
        });

        budgetInput.addEventListener('blur', () => {
            let raw = parseBudget(budgetInput.value);
            if (isNaN(raw) || raw < 0) raw = 0;
            if (raw > 300000) raw = 300000;
            budgetInput.value = raw > 0 ? formatBudgetDisplay(raw) : '';
            updateROI();
        });
/* ================================================================
         * AIRPORT FLIP-BOARD ANIMATION
         * ================================================================ */
        const flipWords = [
            'PENTESTING', 
            'DEVELOPMENT', 
            'ANALYTICS', 
            'SUPPORT', 
            'ENGINEERING', 
            'MAINTENANCE', 
            'MONITORING'
        ];

        // Synthwave color palette for the flip-board
        const flipColors = [
            { hex: '#00f3ff', rgb: '0, 243, 255' },   // Cyan
            { hex: '#ff00ff', rgb: '255, 0, 255' },   // Magenta
            { hex: '#ffff00', rgb: '255, 255, 0' },   // Yellow
            { hex: '#33ff33', rgb: '51, 255, 51' },   // Neon Green
            { hex: '#ff3366', rgb: '255, 51, 102' },  // Neon Pink
            { hex: '#b026ff', rgb: '176, 38, 255' }   // Purple
        ];
        
        const flipBoardEl = document.getElementById('flip-board');
        let currentWordIndex = 0;
        let currentColorIndex = 1; // Starts as magenta in your CSS

        // The character set for the mechanical flip
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

        function airportFlipTo(el, newWord, colorObj) {
            const targetText = '[ ' + newWord + ' ]';
            
            // Apply the new colors to the text, text-shadow, border, and box-shadow
            el.style.color = colorObj.hex;
            el.style.textShadow = `0 0 12px rgba(${colorObj.rgb}, 0.8)`;
            el.style.borderColor = `rgba(${colorObj.rgb}, 0.5)`;
            el.style.boxShadow = `inset 0 0 10px rgba(${colorObj.rgb}, 0.2)`;

            // Clear any existing animation on this element
            if (el.flipInterval) clearInterval(el.flipInterval);

            let iterations = 0;
            // The further right a letter is, the longer it takes to lock in
            const maxIterations = targetText.length * 2 + 10; 

            el.flipInterval = setInterval(() => {
                let output = '';
                
                for (let i = 0; i < targetText.length; i++) {
                    const targetChar = targetText[i];
                    
                    // Keep brackets and spaces static
                    if (targetChar === '[' || targetChar === ']' || targetChar === ' ') {
                        output += targetChar;
                        continue;
                    }

                    // Lock letters in from left to right as iterations increase
                    if (iterations > i * 1.5) {
                        output += targetChar;
                    } else {
                        // Rapidly cycle through random letters for the "flapping" effect
                        output += letters[Math.floor(Math.random() * letters.length)];
                    }
                }
                
                el.innerText = output;
                iterations++;

                // Stop the animation once all letters are locked
                if (iterations >= maxIterations) {
                    clearInterval(el.flipInterval);
                    el.innerText = targetText;
                }
            }, 35); // 35ms per tick gives it a fast, mechanical flutter speed
        }

        // Trigger the flip board every 4 seconds
        setInterval(() => {
            if (!flipBoardEl) return;
            
            // Pick a random word, preventing back-to-back duplicates
            let nextIndex;
            do {
                nextIndex = Math.floor(Math.random() * flipWords.length);
            } while (nextIndex === currentWordIndex);
            currentWordIndex = nextIndex;

            // Pick a random color, preventing back-to-back duplicates
            let nextColor;
            do {
                nextColor = Math.floor(Math.random() * flipColors.length);
            } while (nextColor === currentColorIndex);
            currentColorIndex = nextColor;
            
            // Fire the mechanical flip animation with the new color
            airportFlipTo(flipBoardEl, flipWords[currentWordIndex], flipColors[currentColorIndex]);
            
        }, 4000);

    </script>
